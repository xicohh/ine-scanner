<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Admin - IDentifica</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background-color: #0b0f19; }
  </style>
</head>
<body class="text-slate-200 font-sans min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-[#111827] border border-blue-900/40 rounded-2xl p-6 shadow-2xl relative overflow-hidden">
    <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-blue-600 via-cyan-400 to-blue-600"></div>

    <div class="text-center mb-6">
      <div class="w-12 h-12 bg-blue-950 border border-blue-700/40 rounded-xl flex items-center justify-center mx-auto mb-3 shadow-lg shadow-blue-500/10">
        <i class="bi bi-shield-lock-fill text-xl text-blue-500"></i>
      </div>
      <h1 class="text-xl font-bold text-white tracking-wide">Panel Administrativo</h1>
      <p class="text-xs text-slate-400 mt-1">Acceso restringido al personal del sistema</p>
    </div>

    <form id="authForm" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Correo Electrónico</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="bi bi-envelope"></i></span>
          <input type="email" id="email" class="w-full bg-[#0b0f19] border border-blue-900/40 rounded-lg pl-9 pr-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 transition-all" placeholder="admin@alumnos.udg.mx" required>
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Contraseña</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i class="bi bi-key"></i></span>
          <input type="password" id="password" class="w-full bg-[#0b0f19] border border-blue-900/40 rounded-lg pl-9 pr-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 transition-all" placeholder="••••••••••••" required>
        </div>
      </div>

      <div class="pt-2 space-y-2">
        <button type="submit" id="btnIngresar" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 rounded-lg text-sm transition-all shadow-lg shadow-blue-600/15">
          Ingresar al Sistema
        </button>
        <button type="button" id="btnRegistrar" class="w-full bg-[#0b0f19] border border-slate-700 hover:border-slate-600 text-slate-400 hover:text-slate-300 text-xs py-1.5 rounded-lg transition-all">
          Registrar nuevo administrador
        </button>
      </div>
    </form>
  </div>

  <script>
    const SUPABASE_URL = "https://nlgriqiaxltgdqxurggp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Cvc9vhpOq4ni8mCHWM3ITA_TMBBqAiU";
    
    // Configuración unificada usando el cliente renombrado
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById('authForm');

    form.onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnIngresar');
      btn.disabled = true;

      // CORREGIDO: Ahora llama correctamente a supabaseClient
      const { error } = await supabaseClient.auth.signInWithPassword({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      });

      if (error) {
        alert("Fallo de inicio de sesión: " + error.message);
        btn.disabled = false;
      } else {
        window.location.href = "index.html";
      }
    };

    document.getElementById('btnRegistrar').onclick = async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (!email || !password) return alert("Completa los datos en los inputs.");

      // CORREGIDO: Ahora llama correctamente a supabaseClient
      const { error } = await supabaseClient.auth.signUp({ email, password });
      if (error) alert("Error: " + error.message);
      else alert("¡Usuario administrador guardado con éxito! Revisa tu correo o intenta loguearte.");
    };
  </script>
</body>
</html>
