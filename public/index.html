<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDentifica - Sistema de Registro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background-color: #0b0f19; }
  </style>
</head>
<body class="text-slate-200 font-sans antialiased min-h-screen flex flex-col">

  <nav class="bg-[#111827] border-b border-blue-900/40 px-6 py-4 flex justify-between items-center shadow-lg">
    <div class="flex items-center space-x-3">
      <i class="bi bi-fingerprint text-blue-500 text-2xl animate-pulse"></i>
      <span class="text-xl font-bold tracking-wider text-white">IDentifica <span class="text-blue-500 text-sm font-medium">| INE Scanner</span></span>
    </div>
    <button type="button" id="btnLogOut" class="text-slate-400 hover:text-rose-400 transition-colors flex items-center space-x-1 text-sm bg-slate-800/40 px-3 py-1.5 rounded-lg border border-slate-700/50">
      <i class="bi bi-box-arrow-right"></i>
      <span>Salir</span>
    </button>
  </nav>

  <main class="flex-1 p-6 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-12 gap-6">
    
    <div class="lg:col-span-5 flex flex-col space-y-6">
      
      <div class="bg-[#111827] border border-blue-900/30 rounded-2xl p-5 shadow-xl">
        <h2 class="text-lg font-bold text-white mb-4 flex items-center space-x-2">
          <i class="bi bi-camera text-blue-400"></i>
          <span>Captura de Documento (Ambas Caras)</span>
        </h2>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
          
          <div class="border border-slate-800 bg-slate-950/50 rounded-xl p-3 text-center flex flex-col justify-between">
            <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 block">Frente (Anverso)</span>
            <div id="dropzoneFrente" class="border-2 border-dashed border-blue-900/50 hover:border-blue-500/70 bg-slate-900/40 rounded-lg p-4 cursor-pointer transition-all flex flex-col items-center justify-center min-h-[140px]" onclick="document.getElementById('fileFrente').click()">
              <div id="previewFrente" class="text-slate-400 flex flex-col items-center">
                <i class="bi bi-card-image text-2xl text-blue-500/70 mb-1"></i>
                <span class="text-xs">Subir Frente</span>
              </div>
            </div>
            <input type="file" id="fileFrente" accept="image/*" class="hidden" onchange="manejarSeleccionImagen(this, 'Frente')">
            <input type="hidden" id="base64Frente">
          </div>

          <div class="border border-slate-800 bg-slate-950/50 rounded-xl p-3 text-center flex flex-col justify-between">
            <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 block">Reverso (Atrás)</span>
            <div id="dropzoneReverso" class="border-2 border-dashed border-slate-700/40 hover:border-blue-500/70 bg-slate-900/40 rounded-lg p-4 cursor-pointer transition-all flex flex-col items-center justify-center min-h-[140px]" onclick="document.getElementById('fileReverso').click()">
              <div id="previewReverso" class="text-slate-400 flex flex-col items-center">
                <i class="bi bi-credit-card-2-back text-2xl text-slate-500 mb-1"></i>
                <span class="text-xs">Subir Reverso</span>
              </div>
            </div>
            <input type="file" id="fileReverso" accept="image/*" class="hidden" onchange="manejarSeleccionImagen(this, 'Reverso')">
            <input type="hidden" id="base64Reverso">
          </div>

        </div>

        <button type="button" id="btnScan" onclick="procesarCredencialConIA()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-4 rounded-xl shadow-lg transition-all flex items-center justify-center space-x-2">
          <i class="bi bi-cpu"></i>
          <span>Procesar con Groq Vision</span>
        </button>
      </div>

      <div class="grid grid-cols-3 gap-4">
        <div class="bg-[#111827] border border-blue-900/20 rounded-xl p-4 text-center shadow-md">
          <div class="text-xs text-slate-400 font-medium">Total Escaneos</div>
          <div id="statTotal" class="text-2xl font-black text-white mt-1">0</div>
        </div>
        <div class="bg-[#111827] border border-blue-900/20 rounded-xl p-4 text-center shadow-md">
          <div class="text-xs text-slate-400 font-medium">En Revisión</div>
          <div id="statRevision" class="text-2xl font-black text-amber-400 mt-1">0</div>
        </div>
        <div class="bg-[#111827] border border-blue-900/20 rounded-xl p-4 text-center shadow-md">
          <div class="text-xs text-slate-400 font-medium">Confianza Avg</div>
          <div id="statPromedio" class="text-2xl font-black text-emerald-400 mt-1">0%</div>
        </div>
      </div>

    </div>

    <div class="lg:col-span-7 bg-[#111827] border border-blue-900/30 rounded-2xl p-6 shadow-xl">
      <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-3">
        <h2 class="text-lg font-bold text-white flex items-center space-x-2">
          <i class="bi bi-file-earmark-text text-blue-400"></i>
          <span>Datos Extraídos del Elector</span>
        </h2>
      </div>

      <form id="registroForm" onsubmit="guardarEnSupabase(event)" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Nombre(s)</label>
          <input type="text" id="nombres" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Ap. Paterno</label>
            <input type="text" id="apellido_paterno" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Ap. Materno</label>
            <input type="text" id="apellido_materno" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">CURP</label>
          <input type="text" id="curp" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white font-mono focus:outline-none focus:border-blue-500">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Clave de Elector</label>
          <input type="text" id="clave_elector" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white font-mono focus:outline-none focus:border-blue-500">
        </div>
        <div class="grid grid-cols-3 gap-2">
          <div class="col-span-2">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Fecha Nacimiento</label>
            <input type="text" id="fecha_nacimiento" placeholder="DD/MM/AAAA" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Sección</label>
            <input type="number" id="seccion" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
          </div>
        </div>
        <div class="grid grid-cols-3 gap-2">
          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Sexo</label>
            <input type="text" id="sexo" placeholder="H/M" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white text-center focus:outline-none focus:border-blue-500">
          </div>
          <div class="col-span-2">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Estado</label>
            <input type="text" id="estado" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
          </div>
        </div>
        <div class="sm:col-span-2">
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Dirección Completa</label>
          <input type="text" id="direccion" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
        </div>

        <div class="sm:col-span-2 mt-4 pt-4 border-t border-slate-800 flex space-x-3">
          <button type="button" onclick="limpiarPantallaCompleta()" class="bg-slate-950 hover:bg-slate-900 text-slate-400 border border-slate-800 font-medium py-2.5 px-4 rounded-xl transition-colors">
            Limpiar
          </button>
          <button type="submit" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 px-4 rounded-xl shadow-lg transition-colors flex items-center justify-center space-x-2">
            <i class="bi bi-cloud-arrow-up"></i>
            <span>Guardar Registro en Base de Datos</span>
          </button>
        </div>
      </form>
    </div>

  </main>

  <section class="max-w-7xl mx-auto w-full px-6 pb-8 mt-4">
    <div class="bg-[#111827] border border-blue-900/20 rounded-2xl p-5 shadow-xl">
      <h3 class="text-md font-bold text-white mb-4 flex items-center space-x-2">
        <i class="bi bi-database text-blue-400"></i>
        <span>Últimas Credenciales Almacenadas</span>
      </h3>
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="border-b border-slate-800 text-slate-400 text-xs uppercase tracking-wider bg-slate-950/40">
              <th class="p-3">Elector</th>
              <th class="p-3">CURP</th>
              <th class="p-3">Sección</th>
              <th class="p-3">Estado Revisión</th>
            </tr>
          </thead>
          <tbody id="tablaRegistros" class="text-sm divide-y divide-slate-800/60"></tbody>
        </table>
      </div>
    </div>
  </section>

  <script>
    const SUPABASE_URL = "https://nlgriqiaxltgdqxurggp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Cvc9vhpOq4ni8mCHWM3ITA_TMBBqAiU";
    
    const supabaseClient = window.supabaseJs ? window.supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY) : supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Muestra la vista previa del archivo cargado
    function manejarSeleccionImagen(input, tipo) {
      const file = input.files[0];
      if (!file) return;

      const lector = new FileReader();
      lector.onload = function(e) {
        document.getElementById(`base64${tipo}`).value = e.target.result;
        const cajaPreview = document.getElementById(`preview${tipo}`);
        cajaPreview.innerHTML = `
          <img src="${e.target.result}" class="mx-auto h-24 object-contain rounded-lg shadow-md mb-1 border border-slate-700">
          <span class="text-[10px] text-emerald-400 font-mono block">✓ Listo</span>
        `;
      };
      lector.readAsDataURL(file);
    }

    // Comprime la imagen para evitar el error 413
    function redimensionarYComprimir(base64Original, anchoMaximo = 1000) {
      return new Promise((resolve) => {
        const imagenObjeto = new Image();
        imagenObjeto.src = base64Original;
        imagenObjeto.onload = () => {
          const lienzoCanvas = document.createElement('canvas');
          let nuevoAncho = imagenObjeto.width;
          let nuevoAlto = imagenObjeto.height;

          if (imagenObjeto.width > anchoMaximo) {
            const factorEscala = anchoMaximo / imagenObjeto.width;
            nuevoAncho = anchoMaximo;
            nuevoAlto = imagenObjeto.height * factorEscala;
          }

          lienzoCanvas.width = nuevoAncho;
          lienzoCanvas.height = nuevoAlto;
          const contexto = lienzoCanvas.getContext('2d');
          contexto.drawImage(imagenObjeto, 0, 0, nuevoAncho, nuevoAlto);
          
          const dataUrlComprimido = lienzoCanvas.toDataURL('image/jpeg', 0.60);
          resolve(dataUrlComprimido.split(',')[1]);
        };
      });
    }

    // Procesa las dos caras al mismo tiempo enviándolas a Vercel
    async function procesarCredencialConIA() {
      const botonEscanear = document.getElementById('btnScan');
      const stringFrente = document.getElementById('base64Frente').value;
      const stringReverso = document.getElementById('base64Reverso').value;

      if (!stringFrente) {
        alert("⚠️ Carga al menos la imagen del Frente para procesar.");
        return;
      }

      botonEscanear.disabled = true;
      botonEscanear.innerHTML = `<i class="bi bi-hourglass-split animate-spin"></i> <span>Escaneando ambas caras...</span>`;

      try {
        const frenteListo = await redimensionarYComprimir(stringFrente);
        let reversoListo = null;
        if (stringReverso) {
          reversoListo = await redimensionarYComprimir(stringReverso);
        }

        const respuestaServidor = await fetch('/api/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ imageBase64: frenteListo, reversoBase64: reversoListo })
        });

        if (!respuestaServidor.ok) {
          throw new Error(`Error en el servidor Vercel: ${respuestaServidor.status}`);
        }

        const jsonResultado = await respuestaServidor.json();

        // Rellenar campos
        document.getElementById('nombres').value = jsonResultado.nombres || '';
        document.getElementById('apellido_paterno').value = jsonResultado.apellido_paterno || '';
        document.getElementById('apellido_materno').value = jsonResultado.apellido_materno || '';
        document.getElementById('curp').value = jsonResultado.curp || '';
        document.getElementById('clave_elector').value = jsonResultado.clave_elector || '';
        document.getElementById('fecha_nacimiento').value = jsonResultado.fecha_nacimiento || '';
        document.getElementById('seccion').value = jsonResultado.seccion || '';
        document.getElementById('sexo').value = jsonResultado.sexo || '';
        document.getElementById('estado').value = jsonResultado.estado || '';
        document.getElementById('direccion').value = jsonResultado.direccion || '';

        alert("🎉 ¡Extracción completada con éxito!");
      } catch (error) {
        console.error(error);
        alert("❌ Error al procesar: Revisa que tu variable GROQ_API_KEY esté bien configurada en Vercel.");
      } finally {
        botonEscanear.disabled = false;
        botonEscanear.innerHTML = `<i class="bi bi-cpu"></i> <span>Procesar con Groq Vision</span>`;
      }
    }

    // Guarda los datos en Supabase de forma nativa
    async function guardarEnSupabase(event) {
      event.preventDefault();
      
      const payload = {
        nombres: document.getElementById('nombres').value.toUpperCase(),
        apellido_paterno: document.getElementById('apellido_paterno').value.toUpperCase(),
        apellido_materno: document.getElementById('apellido_materno').value.toUpperCase(),
        curp: document.getElementById('curp').value.replace(/\s+/g, '').toUpperCase(),
        clave_elector: document.getElementById('clave_elector').value.replace(/\s+/g, '').toUpperCase(),
        seccion: parseInt(document.getElementById('seccion').value) || null,
        estado: document.getElementById('estado').value.toUpperCase(),
        direccion: document.getElementById('direccion').value.toUpperCase(),
        estado_revision: 'PENDIENTE',
        indice_confianza: 95
      };

      const { error } = await supabaseClient.from('registros_ine').insert([payload]);
      if (error) {
        alert("Error al guardar: " + error.message);
      } else {
        alert("¡Guardado en Supabase!");
        limpiarPantallaCompleta();
        cargarHistorialDesdeSupabase();
      }
    }

    function limpiarPantallaCompleta() {
      document.getElementById('registroForm').reset();
      document.getElementById('base64Frente').value = "";
      document.getElementById('base64Reverso').value = "";
      document.getElementById('previewFrente').innerHTML = `<i class="bi bi-card-image text-2xl text-blue-500/70 mb-1"></i><span class="text-xs">Subir Frente</span>`;
      document.getElementById('previewReverso').innerHTML = `<i class="bi bi-credit-card-2-back text-2xl text-slate-500 mb-1"></i><span class="text-xs">Subir Reverso</span>`;
    }

    // Seguridad de Sesión
    async function verificarAutenticacion() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = "login.html";
      } else {
        cargarHistorialDesdeSupabase();
      }
    }

    document.getElementById('btnLogOut').onclick = async () => {
      await supabaseClient.auth.signOut();
      window.location.href = "login.html";
    };

    async function cargarHistorialDesdeSupabase() {
      const { data, error } = await supabaseClient.from('registros_ine').select('*').order('created_at', { ascending: false });
      if (error) return;

      const cuerpoTabla = document.getElementById('tablaRegistros');
      cuerpoTabla.innerHTML = "";
      let contadorRevision = 0;
      let sumaConfianza = 0;

      data.forEach(reg => {
        if (reg.estado_revision === 'PENDIENTE') contadorRevision++;
        sumaConfianza += (reg.indice_confianza || 0);
        const claseEstilo = reg.estado_revision === 'APROBADO' ? 'bg-emerald-950 text-emerald-400 border-emerald-800' : 'bg-amber-950 text-amber-400 border-amber-800';
        
        cuerpoTabla.innerHTML += `
          <tr class="border-b border-slate-800/50">
            <td class="p-3 font-semibold text-white">${reg.nombres || ''} ${reg.apellido_paterno || ''}</td>
            <td class="p-3 font-mono text-blue-400">${reg.curp || ''}</td>
            <td class="p-3">${reg.seccion || '0'}</td>
            <td class="p-3"><span class="px-2 py-0.5 rounded text-xs border ${claseEstilo}">${reg.estado_revision}</span></td>
          </tr>
        `;
      });

      document.getElementById('statTotal').textContent = data.length;
      document.getElementById('statRevision').textContent = contadorRevision;
      document.getElementById('statPromedio').textContent = data.length ? Math.round(sumaConfianza / data.length) + '%' : '0%';
    }

    verificarAutenticacion();
  </script>
</body>
</html>
