<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDentifica - Sistema de Registro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background-color: #0b0f19; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/browser-image-compression/2.0.2/browser-image-compression.min.js"></script>
</head>
<body class="text-slate-200 font-sans antialiased min-h-screen flex flex-col">

  <nav class="bg-[#111827] border-b border-blue-900/40 px-6 py-4 flex justify-between items-center shadow-lg">
    <div class="flex items-center space-x-3">
      <i class="bi bi-fingerprint text-blue-500 text-2xl animate-pulse"></i>
      <span class="text-xl font-bold tracking-wider text-white">IDentifica <span class="text-blue-500 text-sm font-medium">| INE Scanner</span></span>
    </div>
    <button type="button" id="btnLogOut" class="text-slate-400 hover:text-red-400 transition-colors flex items-center space-x-2 text-sm bg-slate-900/50 px-3 py-1.5 rounded-lg border border-slate-800">
      <i class="bi bi-box-arrow-right"></i>
      <span>Cerrar Sesión</span>
    </button>
  </nav>

  <main class="flex-1 p-6 max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
    
    <div class="lg:col-span-2 space-y-6">
      
      <div class="bg-[#111827] border border-slate-800/80 rounded-2xl p-6 shadow-xl">
        <h2 class="text-lg font-semibold text-white mb-4 flex items-center space-x-2">
          <i class="bi bi-camera text-blue-500"></i>
          <span>Carga de Documento (INE)</span>
        </h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div id="dropZoneFrente" class="border-2 border-dashed border-slate-700 hover:border-blue-500/50 bg-slate-900/40 rounded-xl p-4 text-center cursor-pointer transition-all flex flex-col items-center justify-center min-h-[160px] relative overflow-hidden group">
            <img id="imgPreviewFrente" class="absolute inset-0 w-full h-full object-cover hidden" src="" alt="Vista previa frente">
            <div class="space-y-2 group-hover:scale-105 transition-transform">
              <i class="bi bi-image text-3xl text-slate-500"></i>
              <p class="text-xs text-slate-400 font-medium">Arrastra o Selecciona el <span class="text-blue-400 font-bold">FRENTE (Anverso)</span></p>
            </div>
            <input type="file" id="fileInputFrente" accept="image/*" class="hidden">
          </div>

          <div id="dropZoneReverso" class="border-2 border-dashed border-slate-700 hover:border-blue-500/50 bg-slate-900/40 rounded-xl p-4 text-center cursor-pointer transition-all flex flex-col items-center justify-center min-h-[160px] relative overflow-hidden group">
            <img id="imgPreviewReverso" class="absolute inset-0 w-full h-full object-cover hidden" src="" alt="Vista previa reverso">
            <div class="space-y-2 group-hover:scale-105 transition-transform">
              <i class="bi bi-image text-3xl text-slate-500"></i>
              <p class="text-xs text-slate-400 font-medium">Arrastra o Selecciona el <span class="text-blue-400 font-bold">REVERSO (Atrás)</span></p>
            </div>
            <input type="file" id="fileInputReverso" accept="image/*" class="hidden">
          </div>
        </div>

        <button type="button" id="btnProcesar" class="w-full mt-4 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 border border-blue-500/30 text-white font-medium py-2.5 rounded-xl transition-all shadow-lg flex items-center justify-center space-x-2">
          <i class="bi bi-cpu"></i>
          <span>Procesar con Groq</span>
        </button>
      </div>

      <form id="formDatos" class="bg-[#111827] border border-slate-800/80 rounded-2xl p-6 shadow-xl grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="md:col-span-2">
          <h2 class="text-lg font-semibold text-white mb-2 flex items-center space-x-2">
            <i class="bi bi-file-earmark-text text-blue-500"></i>
            <span>Datos Extraídos del OCR</span>
          </h2>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Nombres</label>
          <input type="text" id="nombres" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-white focus:outline-none focus:border-blue-500 transition-colors">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Apellido Paterno</label>
          <input type="text" id="apellido_paterno" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-white focus:outline-none focus:border-blue-500 transition-colors">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Apellido Materno</label>
          <input type="text" id="apellido_materno" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-white focus:outline-none focus:border-blue-500 transition-colors">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">CURP</label>
          <input type="text" id="curp" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-white font-mono focus:outline-none focus:border-blue-500 transition-colors">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Clave de Elector</label>
          <input type="text" id="clave_elector" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-white font-mono focus:outline-none focus:border-blue-500 transition-colors">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Sección</label>
          <input type="number" id="seccion" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-white focus:outline-none focus:border-blue-500 transition-colors">
        </div>

        <div class="md:col-span-2 pt-2">
          <button type="submit" id="btnGuardar" disabled class="w-full bg-emerald-600 hover:bg-emerald-500 disabled:opacity-40 disabled:hover:bg-emerald-600 disabled:cursor-not-allowed border border-emerald-500/20 text-white font-semibold py-2.5 rounded-xl transition-all shadow-lg flex items-center justify-center space-x-2">
            <i class="bi bi-cloud-arrow-up"></i>
            <span>Guardar Registro en Base de Datos</span>
          </button>
        </div>
      </form>
    </div>

    <div class="space-y-6">
      <div class="grid grid-cols-3 gap-3">
        <div class="bg-[#111827] border border-slate-800/60 rounded-xl p-3 text-center">
          <div class="text-xs font-semibold text-slate-400">Total</div>
          <div id="statTotal" class="text-xl font-bold text-white mt-0.5">0</div>
        </div>
        <div class="bg-[#111827] border border-slate-800/60 rounded-xl p-3 text-center">
          <div class="text-xs font-semibold text-slate-400">Pendientes</div>
          <div id="statRevision" class="text-xl font-bold text-amber-500 mt-0.5">0</div>
        </div>
        <div class="bg-[#111827] border border-slate-800/60 rounded-xl p-3 text-center">
          <div class="text-xs font-semibold text-slate-400">Confianza</div>
          <div id="statPromedio" class="text-xl font-bold text-blue-400 mt-0.5">0%</div>
        </div>
      </div>

      <div class="bg-[#111827] border border-slate-800/80 rounded-2xl p-4 shadow-xl flex flex-col h-[480px]">
        <h2 class="text-sm font-semibold text-white mb-3 flex items-center space-x-2">
          <i class="bi bi-clock-history text-blue-500"></i>
          <span>Historial de Escaneos</span>
        </h2>
        
        <div class="relative mb-3">
          <i class="bi bi-search absolute left-3 top-2.5 text-slate-500 text-xs"></i>
          <input type="text" id="filterQuery" placeholder="Buscar por Nombre o CURP..." class="w-full bg-slate-900 text-xs border border-slate-800 rounded-xl pl-8 pr-3 py-2 text-white focus:outline-none focus:border-blue-500 transition-colors">
        </div>

        <div class="flex-1 overflow-y-auto border border-slate-800/40 rounded-xl bg-slate-950/40">
          <table class="w-full text-left border-collapse text-xs">
            <thead>
              <tr class="bg-slate-900 border-b border-slate-800 text-slate-400 font-medium">
                <th class="p-2.5">Ciudadano</th>
                <th class="p-2.5">CURP</th>
                <th class="p-2.5">Sec</th>
                <th class="p-2.5">Estado</th>
              </tr>
            </thead>
            <tbody id="tablaRegistros" class="text-slate-300 divide-y divide-slate-900">
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script>
    const SUPABASE_URL = "https://nlgriqiaxltgdqxurggp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Cvc9vhpOq4ni8mCHWM3ITA_TMBBqAiU";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let fileBlobFrente = null;
    let fileBlobReverso = null;
    let base64Frente = "";
    let base64Reverso = "";
    let jsonExtraidoActual = null;

    // Verificar sesión al cargar
    window.onload = async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = "login.html";
      } else {
        fetchTableData();
      }
    };

    // Logout
    document.getElementById('btnLogOut').onclick = async () => {
      await supabaseClient.auth.signOut();
      window.location.href = "login.html";
    };

    // Configuración de Carga de Archivos e Imágenes (Frente)
    const zoneFrente = document.getElementById('dropZoneFrente');
    const inputFrente = document.getElementById('fileInputFrente');
    zoneFrente.onclick = () => inputFrente.click();
    zoneFrente.ondragover = (e) => { e.preventDefault(); zoneFrente.classList.add('border-blue-500', 'bg-blue-950/20'); };
    zoneFrente.ondragleave = () => zoneFrente.classList.remove('border-blue-500', 'bg-blue-950/20');
    zoneFrente.ondrop = (e) => {
      e.preventDefault();
      zoneFrente.classList.remove('border-blue-500', 'bg-blue-950/20');
      if (e.dataTransfer.files && e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0], 'frente');
    };
    inputFrente.onchange = (e) => { if (e.target.files && e.target.files.length) loadFile(e.target.files[0], 'frente'); };

    // Configuración de Carga de Archivos e Imágenes (Reverso)
    const zoneReverso = document.getElementById('dropZoneReverso');
    const inputReverso = document.getElementById('fileInputReverso');
    zoneReverso.onclick = () => inputReverso.click();
    zoneReverso.ondragover = (e) => { e.preventDefault(); zoneReverso.classList.add('border-blue-500', 'bg-blue-950/20'); };
    zoneReverso.ondragleave = () => zoneReverso.classList.remove('border-blue-500', 'bg-blue-950/20');
    zoneReverso.ondrop = (e) => {
      e.preventDefault();
      zoneReverso.classList.remove('border-blue-500', 'bg-blue-950/20');
      if (e.dataTransfer.files && e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0], 'reverso');
    };
    inputReverso.onchange = (e) => { if (e.target.files && e.target.files.length) loadFile(e.target.files[0], 'reverso'); };

    // FUNCIÓN CON COMPRESIÓN DE IMAGEN ACTIVA
    async function loadFile(file, side) {
      if (!file) return;

      const opciones = {
        maxSizeMB: 1,
        maxWidthOrHeight: 1280,
        useWebWorker: true
      };

      try {
        console.log(`Comprimiendo imagen de ${side}...`);
        const archivoComprimido = await imageCompression(file, opciones);
        
        const reader = new FileReader();
        reader.onload = (e) => {
          if (e.target && e.target.result) {
            const base64 = e.target.result.split(',')[1] || "";
            if (side === 'frente') {
              fileBlobFrente = archivoComprimido;
              base64Frente = base64;
              document.getElementById('imgPreviewFrente').src = e.target.result;
              document.getElementById('imgPreviewFrente').classList.remove('hidden');
              if(zoneFrente.querySelector('i')) zoneFrente.querySelector('i').classList.add('hidden');
              if(zoneFrente.querySelector('p')) zoneFrente.querySelector('p').classList.add('hidden');
            } else {
              fileBlobReverso = archivoComprimido;
              base64Reverso = base64;
              document.getElementById('imgPreviewReverso').src = e.target.result;
              document.getElementById('imgPreviewReverso').classList.remove('hidden');
              if(zoneReverso.querySelector('i')) zoneReverso.querySelector('i').classList.add('hidden');
              if(zoneReverso.querySelector('p')) zoneReverso.querySelector('p').classList.add('hidden');
            }
            console.log(`¡Imagen de ${side} optimizada con éxito!`);
          }
        };
        reader.readAsDataURL(archivoComprimido);

      } catch (error) {
        console.error("Error al comprimir la imagen:", error);
        alert("No se pudo optimizar la imagen. Intenta con otra o tómala con menor resolución.");
      }
    }

    // Petición al Backend /api/scan con Groq
    document.getElementById('btnProcesar').onclick = async () => {
      if (!base64Frente) return alert("Debes seleccionar al menos la imagen del Frente para procesar.");
      
      const btn = document.getElementById('btnProcesar');
      btn.disabled = true;
      btn.innerHTML = `<i class="bi bi-arrow-clockwise animate-spin"></i> Analizando con Llama Vision...`;

      try {
        const response = await fetch('/api/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            imageBase64: base64Frente,
            reversoBase64: base64Reverso 
          })
        });

        if (!response.ok) {
          const textoError = await response.text();
          throw new Error(textoError || "Error desconocido en el servidor");
        }

        const resultado = await response.json();
        jsonExtraidoActual = resultado;

        document.getElementById('nombres').value = resultado.nombres || '';
        document.getElementById('apellido_paterno').value = resultado.apellido_paterno || '';
        document.getElementById('apellido_materno').value = resultado.apellido_materno || '';
        document.getElementById('curp').value = resultado.curp || '';
        document.getElementById('clave_elector').value = resultado.clave_elector || '';
        document.getElementById('seccion').value = resultado.seccion || 0;

        document.getElementById('btnGuardar').disabled = false;

      } catch (err) {
        alert("Error de procesamiento: " + err.message);
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<i class="bi bi-cpu"></i> Procesar con Groq`;
      }
    };

    // Guardar en Supabase Database + Storage
    document.getElementById('formDatos').onsubmit = async (e) => {
      e.preventDefault();
      const btnSave = document.getElementById('btnGuardar');
      btnSave.disabled = true;
      btnSave.innerHTML = `<i class="bi bi-arrow-clockwise animate-spin"></i> Guardando...`;

      try {
        let urlPublica = "";

        if (fileBlobFrente) {
          const fileExt = fileBlobFrente.name ? fileBlobFrente.name.split('.').pop() : 'jpg';
          const fileName = `${Date.now()}_frente.${fileExt}`;
          
          const { data: uploadData, error: uploadError } = await supabaseClient.storage
            .from('imagenes_ine')
            .upload(fileName, fileBlobFrente);

          if (uploadError) throw uploadError;

          const { data: urlData } = supabaseClient.storage
            .from('imagenes_ine')
            .getPublicUrl(fileName);
            
          urlPublica = urlData.publicUrl;
        }

        const valorConfianza = jsonExtraidoActual ? (jsonExtraidoActual.indice_confianza || 75) : 75;

        const seccionInput = document.getElementById('seccion').value;
        const seccionEntera = isNaN(parseInt(seccionInput)) ? 0 : parseInt(seccionInput);

        const { error: insertError } = await supabaseClient.from('registros_ine').insert([{
          nombres: document.getElementById('nombres').value.trim(),
          apellido_paterno: document.getElementById('apellido_paterno').value.trim(),
          apellido_materno: document.getElementById('apellido_materno').value.trim(),
          curp: document.getElementById('curp').value.trim(),
          clave_elector: document.getElementById('clave_elector').value.trim(),
          seccion: seccionEntera,
          estado_revision: valorConfianza >= 85 ? 'APROBADO' : 'PENDIENTE',
          indice_confianza: valorConfianza,
          url_evidencia: urlPublica
        }]);

        if (insertError) throw insertError;

        alert("¡Registro e imagen guardados exitosamente!");
        
        document.getElementById('formDatos').reset();
        document.getElementById('imgPreviewFrente').classList.add('hidden');
        document.getElementById('imgPreviewReverso').classList.add('hidden');
        zoneFrente.querySelectorAll('i, p').forEach(el => el.classList.remove('hidden'));
        zoneReverso.querySelectorAll('i, p').forEach(el => el.classList.remove('hidden'));
        
        base64Frente = ""; base64Reverso = ""; fileBlobFrente = null; fileBlobReverso = null;
        btnSave.disabled = true;

        fetchTableData();

      } catch (err) {
        alert("Error al guardar: " + err.message);
        btnSave.disabled = false;
      } finally {
        btnSave.innerHTML = `<i class="bi bi-cloud-arrow-up"></i> Guardar Registro en Base de Datos`;
      }
    };

    // Buscador en Tiempo Real
    document.getElementById('filterQuery').oninput = () => fetchTableData();

    // Historial de escaneos blindado al 100%
    async function fetchTableData() {
      try {
        const filterInput = document.getElementById('filterQuery');
        // Usamos protección en una sola línea integrada
        const q = filterInput ? filterInput.value.trim() : '';
        
        let query = supabaseClient.from('registros_ine').select('*');
        
        if (q) {
          query = query.or(`nombres.ilike.%${q}%,curp.ilike.%${q}%,clave_elector.ilike.%${q}%`);
        }

        const { data, error } = await query.order('created_at', { ascending: false });
        if (error) throw error;

        const cuerpoTabla = document.getElementById('tablaRegistros');
        if (!cuerpoTabla) return;
        
        cuerpoTabla.innerHTML = "";
        let contadorRevision = 0;
        let sumaConfianza = 0;

        data.forEach(reg => {
          const nombresVal = reg.nombres || '';
          const paternoVal = reg.apellido_paterno || '';
          const maternoVal = reg.apellido_materno || '';
          const nombreCompleto = `${nombresVal} ${paternoVal} ${maternoVal}`.trim() || 'SIN NOMBRE';
          
          const curpVal = reg.curp || 'SIN CURP';
          const seccionVal = reg.seccion || '0';
          const confianzaVal = reg.indice_confianza || 0;
          const estadoRev = reg.estado_revision || 'PENDIENTE';

          if (estadoRev === 'PENDIENTE') contadorRevision++;
          sumaConfianza += confianzaVal;

          const claseEstilo = estadoRev === 'APROBADO' 
            ? 'bg-emerald-950 text-emerald-400 border-emerald-800' 
            : 'bg-amber-950 text-amber-400 border-amber-800';
          
          cuerpoTabla.innerHTML += `
            <tr class="border-b border-slate-800/50 hover:bg-blue-950/20 transition-all">
              <td class="p-2.5 font-semibold text-white max-w-[120px] truncate" title="${nombreCompleto}">${nombreCompleto}</td>
              <td class="p-2.5 font-mono text-blue-400 uppercase">${curpVal}</td>
              <td class="p-2.5">${seccionVal}</td>
              <td class="p-2.5">
                <span class="px-1.5 py-0.5 rounded text-[10px] border ${claseEstilo}">
                  ${estadoRev}
                </span>
              </td>
            </tr>
          `;
        });

        if(document.getElementById('statTotal')) document.getElementById('statTotal').textContent = data.length;
        if(document.getElementById('statRevision')) document.getElementById('statRevision').textContent = contadorRevision;
        if(document.getElementById('statPromedio')) document.getElementById('statPromedio').textContent = data.length ? Math.round(sumaConfianza / data.length) + '%' : '0%';

      } catch (err) {
        console.error("Error crítico al renderizar la tabla de historial:", err);
      }
    }
  </script>
</body>
</html>
